<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일일 카페 주문</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; }
  .app { max-width: 600px; margin: 0 auto; padding: 1rem; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 1rem; }
  .tabs { display: flex; margin-bottom: 1.25rem; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
  .tab { padding: 8px 13px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
  .tab.active { color: #111; border-bottom: 2px solid #111; }
  .section { display: none; }
  .section.active { display: block; }
  .sync-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #999; margin-bottom: 12px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .sync-dot.ok { background: #1D9E75; }
  .sync-dot.err { background: #E24B4A; }
  .sync-dot.loading { background: #EF9F27; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 1rem; }
  .menu-btn { position: relative; padding: 14px 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 12px; background: #fff; color: #111; text-align: center; line-height: 1.4; transition: all 0.1s; }
  .menu-btn:active { transform: scale(0.96); background: #f0f0f0; }
  .menu-btn .menu-name { display: block; font-size: 14px; font-weight: 500; }
  .menu-btn .menu-temp { display: block; font-size: 11px; color: #888; margin-top: 1px; }
  .menu-btn .menu-price { display: block; font-size: 12px; color: #555; margin-top: 3px; font-weight: 500; }
  .menu-btn.hot { border-top: 3px solid #E24B4A; }
  .menu-btn.ice { border-top: 3px solid #378ADD; }
  .menu-btn.normal { border-top: 3px solid #1D9E75; }
  .menu-btn.ade2 { border-top: 3px solid #EF9F27; }
  .menu-btn .badge { position: absolute; top: -7px; right: -7px; width: 20px; height: 20px; border-radius: 50%; background: #378ADD; color: #fff; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .cart { background: #f0f0f0; border-radius: 8px; padding: 12px 14px; min-height: 52px; margin-bottom: 10px; }
  .cart-empty { font-size: 13px; color: #aaa; }
  .cart-items { display: flex; flex-wrap: wrap; gap: 6px; }
  .cart-tag { display: flex; align-items: center; gap: 4px; background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 4px 10px; font-size: 13px; }
  .cart-tag button { background: none; border: none; cursor: pointer; color: #aaa; font-size: 14px; padding: 0 0 0 2px; }
  .cart-tag button:hover { color: #E24B4A; }
  .cart-total { text-align: right; font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #111; }
  .pay-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .pay-btn { padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; border-radius: 10px; transition: opacity 0.15s; }
  .pay-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .pay-btn.cash { background: #111; color: #fff; }
  .pay-btn.transfer { background: #378ADD; color: #fff; }
  .pay-btn:not(:disabled):active { opacity: 0.8; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 24px; width: 90%; max-width: 340px; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: #888; margin-bottom: 16px; }
  .modal-amount { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 16px; }
  .modal input { width: 100%; font-size: 18px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; text-align: right; }
  .change-row { background: #f0f0f0; border-radius: 8px; padding: 12px 14px; font-size: 14px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .change-val { font-size: 18px; font-weight: 600; color: #1D9E75; }
  .change-val.minus { color: #E24B4A; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 11px; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; border: none; }
  .btn-cancel { background: #f0f0f0; color: #555; }
  .btn-confirm { background: #111; color: #fff; }
  .btn-confirm.blue { background: #378ADD; }
  .btn-confirm:disabled { opacity: 0.3; cursor: not-allowed; }
  .transfer-notice { font-size: 20px; font-weight: 700; color: #378ADD; text-align: center; padding: 12px 0; margin-bottom: 16px; line-height: 1.5; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 1rem; }
  .stat-card { background: #f0f0f0; border-radius: 8px; padding: 12px 14px; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; }
  .stat-sub { font-size: 11px; color: #aaa; }
  .summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1rem; }
  .summary-card { background: #111; border-radius: 8px; padding: 12px 14px; color: #fff; }
  .summary-card:nth-child(2) { background: #444; }
  .summary-card:nth-child(3) { background: #378ADD; }
  .summary-label { font-size: 11px; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
  .summary-value { font-size: 15px; font-weight: 600; }
  .order-wrap { display: flex; flex-direction: column; gap: 10px; }
  .order-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 14px; }
  .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
  .order-title { font-size: 14px; font-weight: 600; }
  .pay-badge { font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
  .pay-badge.cash { background: #f0f0f0; color: #555; }
  .pay-badge.transfer { background: #e8f2fc; color: #378ADD; }
  .done-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: #e6f7f1; color: #1D9E75; font-weight: 600; }
  .done-btn { font-size: 12px; padding: 5px 12px; cursor: pointer; border: 1px solid #ddd; border-radius: 20px; background: none; color: #555; }
  .done-btn:hover { background: #f5f5f5; }
  .restore-btn { font-size: 12px; padding: 5px 12px; cursor: pointer; border: 1px solid #E24B4A; border-radius: 20px; background: none; color: #E24B4A; }
  .restore-btn:hover { background: #fff0f0; }
  .order-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  .order-cnt { font-weight: 600; }
  .order-amount { font-size: 12px; color: #888; margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; text-align: right; }
  .empty-msg { font-size: 13px; color: #aaa; text-align: center; padding: 2rem 0; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .refresh-btn { font-size: 12px; padding: 5px 12px; cursor: pointer; border: 1px solid #ddd; border-radius: 20px; background: none; color: #555; }
  .menu-manage-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .menu-manage-item { display: flex; align-items: center; gap: 6px; background: #f5f5f5; border-radius: 8px; padding: 10px 12px; }
  .menu-manage-item input[type="text"] { flex: 2; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 6px 8px; min-width: 0; }
  .menu-manage-item input[type="number"] { flex: 1; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 6px 8px; min-width: 0; }
  .menu-manage-item select { font-size: 12px; border: 1px solid #ddd; border-radius: 6px; padding: 6px 4px; }
  .del-btn { background: none; border: none; cursor: pointer; color: #aaa; font-size: 18px; padding: 2px 4px; line-height: 1; flex-shrink: 0; }
  .del-btn:hover { color: #E24B4A; }
  .add-row { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .add-row input[type="text"] { flex: 2; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; min-width: 80px; }
  .add-row input[type="number"] { flex: 1; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 8px 8px; min-width: 70px; }
  .add-row select { font-size: 12px; border: 1px solid #ddd; border-radius: 6px; padding: 8px 4px; }
  .add-row button { font-size: 13px; padding: 8px 14px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; white-space: nowrap; }
  .add-row button:hover { background: #f5f5f5; }
  .notice { font-size: 12px; color: #aaa; margin-top: 6px; }
  .reset-area { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #eee; }
  .reset-btn { background: none; border: 1px solid #E24B4A; color: #E24B4A; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
  .reset-btn:hover { background: #fff0f0; }
  .pager-input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .pager-input-row input { flex: 1; font-size: 28px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; text-align: center; letter-spacing: 4px; }
  .pager-badge { display: inline-flex; align-items: center; gap: 4px; background: #FFF3CD; color: #B45309; font-size: 13px; font-weight: 600; padding: 5px 12px; border-radius: 20px; border: 1px solid #F59E0B; }
  .pay-badge-sm { font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
  .pay-badge-sm.cash { background: #f0f0f0; color: #555; }
  .pay-badge-sm.transfer { background: #e8f2fc; color: #378ADD; }
</style>
</head>
<body>
<div class="app">
  <h1>☕ 일일 카페</h1>
  <div class="tabs">
    <button class="tab active" onclick="showTab('order',this)">주문 입력</button>
    <button class="tab" onclick="showTab('stats',this)">총 집계</button>
    <button class="tab" onclick="showTab('teams',this)">팀 오더</button>
    <button class="tab" onclick="showTab('done',this)">완료 기록</button>
    <button class="tab" onclick="showTab('settings',this)">메뉴 관리</button>
  </div>

  <div id="tab-order" class="section active">
    <div class="sync-bar"><span class="sync-dot" id="dot-order"></span><span id="sync-label-order">구글 시트 연결 중...</span></div>
    <div class="menu-grid" id="menu-grid"></div>
    <div class="cart" id="cart"><span class="cart-empty">선택한 음료가 없어요</span></div>
    <div class="cart-total" id="cart-total" style="display:none;"></div>
    <div class="pay-btns">
      <button class="pay-btn cash" id="btn-cash" onclick="openCashModal()" disabled>💵 현금</button>
      <button class="pay-btn transfer" id="btn-transfer" onclick="openTransferModal()" disabled>🏦 계좌이체</button>
    </div>
  </div>

  <div id="tab-stats" class="section">
    <div class="top-bar">
      <div class="sync-bar" style="margin:0;"><span class="sync-dot" id="dot-stats"></span><span id="sync-label-stats">불러오는 중...</span></div>
      <button class="refresh-btn" onclick="loadOrders('stats')">새로고침</button>
    </div>
    <div class="summary-grid" id="summary-grid"></div>
    <div class="stat-grid" id="stat-grid"></div>
    <div style="background:#f0f0f0;border-radius:8px;padding:12px 14px;font-size:14px;">
      총 주문: <strong id="total-orders">0</strong>건 &nbsp;·&nbsp; 총 판매: <strong id="total-cups">0</strong>잔
    </div>
  </div>

  <div id="tab-teams" class="section">
    <div class="top-bar">
      <div class="sync-bar" style="margin:0;"><span class="sync-dot" id="dot-teams"></span><span id="sync-label-teams">불러오는 중...</span></div>
      <button class="refresh-btn" onclick="loadOrders('teams')">새로고침</button>
    </div>
    <div class="order-wrap" id="team-order-wrap"></div>
  </div>

  <div id="tab-done" class="section">
    <div class="top-bar">
      <div class="sync-bar" style="margin:0;"><span class="sync-dot" id="dot-done"></span><span id="sync-label-done">불러오는 중...</span></div>
      <button class="refresh-btn" onclick="loadOrders('done')">새로고침</button>
    </div>
    <div class="order-wrap" id="done-order-wrap"></div>
  </div>

  <div id="tab-settings" class="section">
    <p style="font-size:13px;color:#888;margin-bottom:12px;">메뉴 추가·수정·삭제</p>
    <div class="menu-manage-list" id="menu-manage-list"></div>
    <div class="add-row">
      <input type="text" id="new-name" placeholder="메뉴 이름" />
      <select id="new-temp">
        <option value="hot">핫</option>
        <option value="ice">아이스</option>
        <option value="normal">에이드1(초록)</option>
        <option value="ade2">에이드2(주황)</option>
      </select>
      <input type="number" id="new-price" placeholder="가격" min="0" step="100" />
      <button onclick="addMenu()">+ 추가</button>
    </div>
    <p class="notice">* 메뉴는 이 기기에 저장됩니다. 주문 데이터는 구글 시트에 저장됩니다.</p>
    <div class="reset-area">
      <p style="font-size:13px;color:#888;margin-bottom:8px;">영업 종료 후 주문 초기화</p>
      <button class="reset-btn" onclick="resetOrders()">오늘 주문 전체 초기화</button>
    </div>
  </div>
</div>

<!-- 현금 모달 -->
<div class="modal-overlay" id="cash-modal">
  <div class="modal">
    <h3>💵 현금 결제</h3>
    <p>주문 금액</p>
    <div class="modal-amount" id="cash-order-amount"></div>
    <input type="number" id="cash-received" placeholder="받은 금액 입력" step="100" oninput="calcChange()" />
    <div class="change-row">
      <span>거스름돈</span>
      <span class="change-val" id="change-val">—</span>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('cash-modal')">취소</button>
      <button class="btn-confirm" id="cash-confirm-btn" onclick="confirmCash()" disabled>결제 완료</button>
    </div>
  </div>
</div>

<!-- 계좌이체 모달 -->
<div class="modal-overlay" id="transfer-modal">
  <div class="modal">
    <h3>🏦 계좌이체</h3>
    <div class="transfer-notice">계좌이체입니다<br>꼭 확인해 주세요!</div>
    <p style="margin-bottom:8px;">주문 금액</p>
    <div class="modal-amount" id="transfer-order-amount"></div>
    <div class="modal-btns" style="margin-top:16px;">
      <button class="btn-cancel" onclick="closeModal('transfer-modal')">취소</button>
      <button class="btn-confirm blue" onclick="confirmTransfer()">확인 완료</button>
    </div>
  </div>
</div>

<!-- 픽업번호 모달 -->
<div class="modal-overlay" id="pager-modal">
  <div class="modal">
    <h3>🏷️ 픽업번호</h3>
    <p>픽업번호를 입력해주세요 (없으면 건너뛰기)</p>
    <div class="pager-input-row">
      <input type="number" id="pager-number" placeholder="000" min="1" max="999" />
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('pager-modal')">취소</button>
      <button class="btn-confirm" onclick="confirmPager()">확인</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbx06UlDfqBU4DQhizE3I8mOB3Os6VRKMFlfhU3gzKyDMvS1irXH-LRLhAy21wowWeW6/exec';

const menus = [
  {id:1,name:'아메리카노',temp:'hot',price:2000},
  {id:2,name:'아메리카노',temp:'ice',price:3000},
  {id:3,name:'선교라떼',temp:'hot',price:3000},
  {id:4,name:'선교라떼',temp:'ice',price:4000},
  {id:5,name:'매실·히비스커스',temp:'normal',price:5000},
  {id:6,name:'자몽·블루레몬',temp:'ade2',price:5000},
];
let nextMenuId = 7;
let cart = {};
let orders = [];
let autoRefreshTimer = null;

function tempLabel(t){return t==='hot'?'핫':t==='ice'?'아이스':'';}
function menuLabel(m){return (m.temp==='normal'||m.temp==='ade2')?m.name:m.name+' '+tempLabel(m.temp);}
function won(n){return Number(n).toLocaleString()+'원';}
function cartTotal(){return Object.entries(cart).reduce((sum,[id,cnt])=>{const m=menus.find(m=>m.id==id);return sum+(m&&m.price?m.price*cnt:0);},0);}

function setSyncStatus(tab,state,msg){
  const dot=document.getElementById('dot-'+tab);
  const label=document.getElementById('sync-label-'+tab);
  if(!dot||!label)return;
  dot.className='sync-dot '+state;
  label.textContent=msg;
}

function showTab(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  clearInterval(autoRefreshTimer);
  if(name==='stats')loadOrders('stats');
  if(name==='teams'){loadOrders('teams');autoRefreshTimer=setInterval(()=>loadOrders('teams'),10000);}
  if(name==='done'){loadOrders('done');autoRefreshTimer=setInterval(()=>loadOrders('done'),10000);}
  if(name==='settings')renderManage();
}

function playAlert(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    function beep(freq,start,dur){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(freq,ctx.currentTime+start);
      g.gain.setValueAtTime(0.35,ctx.currentTime+start);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur);
    }
    beep(1046,0,0.08);beep(1318,0.1,0.15);
  }catch(e){}
}

async function loadOrders(tab){
  setSyncStatus(tab,'loading','불러오는 중...');
  try{
    const res=await fetch(API+'?t='+Date.now());
    const newOrders=await res.json();
    if(tab==='teams'){
      const prevCount=orders.filter(o=>!o.done).length;
      const newCount=newOrders.filter(o=>!o.done).length;
      if(newCount>prevCount) playAlert();
    }
    orders=newOrders;
    const t=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    setSyncStatus(tab,'ok','연결됨 · '+t);
    if(tab==='stats')renderStats();
    if(tab==='teams')renderTeams();
    if(tab==='done')renderDone();
  }catch(e){setSyncStatus(tab,'err','연결 실패 — 새로고침을 눌러주세요');}
}

async function apiPost(payload){
  const res=await fetch(API,{method:'POST',body:JSON.stringify(payload)});
  return res.json();
}

function renderMenuGrid(){
  document.getElementById('menu-grid').innerHTML=menus.map(m=>{
    const cnt=cart[m.id]||0;
    return `<button class="menu-btn ${m.temp}" onclick="addToCart(${m.id})">
      ${cnt>0?`<span class="badge">${cnt}</span>`:''}
      <span class="menu-name">${m.name}</span>
      <span class="menu-temp">${tempLabel(m.temp)}</span>
      <span class="menu-price">${m.price?won(m.price):''}</span>
    </button>`;
  }).join('');
}

function renderCart(){
  const el=document.getElementById('cart');
  const totalEl=document.getElementById('cart-total');
  const items=Object.entries(cart).filter(([,v])=>v>0);
  if(!items.length){
    el.innerHTML='<span class="cart-empty">선택한 음료가 없어요</span>';
    totalEl.style.display='none';
    document.getElementById('btn-cash').disabled=true;
    document.getElementById('btn-transfer').disabled=true;
    return;
  }
  el.innerHTML='<div class="cart-items">'+items.map(([id,cnt])=>{
    const m=menus.find(m=>m.id==id);
    return `<div class="cart-tag"><span>${menuLabel(m)}${cnt>1?' ×'+cnt:''}</span><button onclick="removeFromCart(${id})">×</button></div>`;
  }).join('')+'</div>';
  const total=cartTotal();
  totalEl.style.display='block';
  totalEl.textContent='합계: '+won(total);
  document.getElementById('btn-cash').disabled=false;
  document.getElementById('btn-transfer').disabled=false;
}

function addToCart(id){cart[id]=(cart[id]||0)+1;renderMenuGrid();renderCart();}
function removeFromCart(id){if(cart[id]>1)cart[id]--;else delete cart[id];renderMenuGrid();renderCart();}

function openCashModal(){
  const total=cartTotal();
  document.getElementById('cash-order-amount').textContent=won(total);
  document.getElementById('cash-received').value='';
  document.getElementById('change-val').textContent='—';
  document.getElementById('change-val').className='change-val';
  document.getElementById('cash-confirm-btn').disabled=true;
  document.getElementById('cash-modal').classList.add('show');
  setTimeout(()=>document.getElementById('cash-received').focus(),100);
}

function calcChange(){
  const total=cartTotal();
  const received=parseInt(document.getElementById('cash-received').value)||0;
  const change=received-total;
  const el=document.getElementById('change-val');
  if(!received){el.textContent='—';el.className='change-val';document.getElementById('cash-confirm-btn').disabled=true;return;}
  el.textContent=won(Math.abs(change));
  el.className='change-val'+(change<0?' minus':'');
  document.getElementById('cash-confirm-btn').disabled=change<0;
}

function openTransferModal(){
  const total=cartTotal();
  document.getElementById('transfer-order-amount').textContent=won(total);
  document.getElementById('transfer-modal').classList.add('show');
}

let pendingPayType = null;

function closeModal(id){document.getElementById(id).classList.remove('show');}

async function confirmCash(){
  closeModal('cash-modal');
  pendingPayType = 'cash';
  openPagerModal();
}
async function confirmTransfer(){
  closeModal('transfer-modal');
  pendingPayType = 'transfer';
  openPagerModal();
}

function openPagerModal(){
  document.getElementById('pager-number').value = '';
  document.getElementById('pager-modal').classList.add('show');
  setTimeout(()=>document.getElementById('pager-number').focus(), 100);
}
function skipPager(){ closeModal('pager-modal'); submitOrder(pendingPayType, ''); }
function confirmPager(){
  const num = document.getElementById('pager-number').value.trim();
  if(!num){ alert('픽업번호를 입력해주세요!'); return; }
  closeModal('pager-modal');
  submitOrder(pendingPayType, num);
}

async function submitOrder(payType, pagerNum){
  const items=Object.entries(cart).filter(([,v])=>v>0);
  if(!items.length)return;
  setSyncStatus('order','loading','구글 시트에 저장 중...');
  document.getElementById('btn-cash').disabled=true;
  document.getElementById('btn-transfer').disabled=true;
  const num=orders.length+1;
  const time=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  const total=cartTotal();
  try{
    await apiPost({action:'add',num,items:items.map(([id,cnt])=>({menuId:parseInt(id),cnt})),time,payType,total,pagerNum:pagerNum||''});
    orders.push({num,items:items.map(([id,cnt])=>({menuId:parseInt(id),cnt})),done:false,time,payType,total,pagerNum:pagerNum||''});
    setSyncStatus('order','ok',`${num}번 주문 저장 완료`);
    cart={};renderMenuGrid();renderCart();
  }catch(e){
    setSyncStatus('order','err','저장 실패 — 다시 시도해주세요');
    document.getElementById('btn-cash').disabled=false;
    document.getElementById('btn-transfer').disabled=false;
  }
}

function orderRows(o){
  return o.items.map(i=>{
    const m=menus.find(m=>m.id===i.menuId);
    return `<div class="order-row"><span>${m?menuLabel(m):'?'}</span><span class="order-cnt">${i.cnt}잔</span></div>`;
  }).join('');
}

function payBadge(p){
  if(p==='cash')return '<span class="pay-badge cash">현금</span>';
  if(p==='transfer')return '<span class="pay-badge transfer">계좌이체</span>';
  return '';
}

function renderTeams(){
  const wrap=document.getElementById('team-order-wrap');
  const pending=orders.filter(o=>!o.done);
  if(!pending.length){wrap.innerHTML='<div class="empty-msg">대기 중인 주문이 없어요 🎉</div>';return;}
  wrap.innerHTML=pending.map(o=>{
    const paySmall=o.payType==='cash'?'<span class="pay-badge-sm cash">현금</span>':o.payType==='transfer'?'<span class="pay-badge-sm transfer">계좌이체</span>':'';
    const pickup=o.pagerNum
      ?`<div style="font-size:22px;font-weight:600;color:#B45309;background:#FFF3CD;border:1px solid #F59E0B;border-radius:20px;padding:4px 16px;display:inline-block;margin-bottom:10px;">🏷️ 픽업번호 : ${o.pagerNum}</div>`
      :'';
    return `<div class="order-card">
      <div class="order-header">
        <span class="order-title" style="font-size:13px;color:#aaa;font-weight:400;">${o.time||''}</span>
        <button class="done-btn" onclick="markDone(${o.num})">✓ 완료</button>
      </div>
      ${pickup}
      ${orderRows(o)}
      ${o.total?`<div class="order-amount">${paySmall} ${won(o.total)}</div>`:''}
    </div>`;
  }).join('');
}

function renderDone(){
  const wrap=document.getElementById('done-order-wrap');
  const done=orders.filter(o=>o.done).slice().reverse();
  if(!done.length){wrap.innerHTML='<div class="empty-msg">완료된 주문이 없어요</div>';return;}
  wrap.innerHTML=done.map(o=>{
    const total=o.items.reduce((a,i)=>a+i.cnt,0);
    return `<div class="order-card">
      <div class="order-header">
        <span class="order-title">${o.num}번 주문 <span style="font-size:12px;font-weight:400;color:#aaa;">${total}잔 · ${o.time||''}</span></span>
        <div style="display:flex;gap:6px;align-items:center;">${payBadge(o.payType)}<span class="done-badge">완료</span><button class="restore-btn" onclick="restoreOrder(${o.num})">↩ 복구</button></div>
      </div>
      ${orderRows(o)}
      ${o.total?`<div class="order-amount">${won(o.total)}</div>`:''}
    </div>`;
  }).join('');
}

async function markDone(num){
  setSyncStatus('teams','loading','저장 중...');
  try{await apiPost({action:'update',num,done:true});const o=orders.find(o=>o.num===num);if(o)o.done=true;setSyncStatus('teams','ok','저장됨');renderTeams();}
  catch(e){setSyncStatus('teams','err','저장 실패');}
}

async function restoreOrder(num){
  setSyncStatus('done','loading','복구 중...');
  try{
    await apiPost({action:'update',num,done:false});
    const o=orders.find(o=>o.num===num);if(o)o.done=false;
    setSyncStatus('done','ok','복구됨');renderDone();
    showTab('teams',document.querySelectorAll('.tab')[2]);
  }catch(e){setSyncStatus('done','err','복구 실패');}
}

function renderStats(){
  const counts={};
  menus.forEach(m=>counts[m.id]=0);
  orders.forEach(o=>o.items.forEach(i=>{if(counts[i.menuId]!==undefined)counts[i.menuId]+=i.cnt;}));
  const totalRevenue=orders.reduce((s,o)=>s+(Number(o.total)||0),0);
  const cashRevenue=orders.filter(o=>o.payType==='cash').reduce((s,o)=>s+(Number(o.total)||0),0);
  const transferRevenue=orders.filter(o=>o.payType==='transfer').reduce((s,o)=>s+(Number(o.total)||0),0);
  document.getElementById('summary-grid').innerHTML=`
    <div class="summary-card"><div class="summary-label">총 매출</div><div class="summary-value">${won(totalRevenue)}</div></div>
    <div class="summary-card"><div class="summary-label">💵 현금</div><div class="summary-value">${won(cashRevenue)}</div></div>
    <div class="summary-card"><div class="summary-label">🏦 계좌이체</div><div class="summary-value">${won(transferRevenue)}</div></div>
  `;
  document.getElementById('stat-grid').innerHTML=menus.map(m=>`
    <div class="stat-card">
      <div class="stat-label">${menuLabel(m)}</div>
      <div class="stat-value">${counts[m.id]}</div>
      <div class="stat-sub">잔${m.price?' · '+won(counts[m.id]*m.price):''}</div>
    </div>`).join('');
  document.getElementById('total-orders').textContent=orders.length;
  document.getElementById('total-cups').textContent=orders.reduce((s,o)=>s+o.items.reduce((a,i)=>a+i.cnt,0),0);
}

function renderManage(){
  document.getElementById('menu-manage-list').innerHTML=menus.map(m=>`
    <div class="menu-manage-item">
      <input type="text" value="${m.name}" onchange="updateName(${m.id},this.value)" placeholder="이름"/>
      <select onchange="updateTemp(${m.id},this.value)">
        <option value="hot"${m.temp==='hot'?' selected':''}>핫</option>
        <option value="ice"${m.temp==='ice'?' selected':''}>아이스</option>
        <option value="normal"${m.temp==='normal'?' selected':''}>에이드1(초록)</option>
        <option value="ade2"${m.temp==='ade2'?' selected':''}>에이드2(주황)</option>
      </select>
      <input type="number" value="${m.price||0}" onchange="updatePrice(${m.id},this.value)" placeholder="가격" min="0" step="100"/>
      <button class="del-btn" onclick="deleteMenu(${m.id})">×</button>
    </div>`).join('');
}

function updateName(id,val){const m=menus.find(m=>m.id===id);if(m){m.name=val;renderMenuGrid();}}
function updateTemp(id,val){const m=menus.find(m=>m.id===id);if(m){m.temp=val;renderMenuGrid();}}
function updatePrice(id,val){const m=menus.find(m=>m.id===id);if(m){m.price=parseInt(val)||0;renderMenuGrid();}}
function deleteMenu(id){menus=menus.filter(m=>m.id!==id);saveMenus();renderMenuGrid();renderManage();}
function addMenu(){
  const name=document.getElementById('new-name').value.trim();
  if(!name)return;
  const price=parseInt(document.getElementById('new-price').value)||0;
  menus.push({id:nextMenuId++,name,temp:document.getElementById('new-temp').value,price});
  saveMenus();renderMenuGrid();renderManage();
  document.getElementById('new-name').value='';
  document.getElementById('new-price').value='';
}

async function resetOrders(){
  if(!confirm('오늘 주문을 모두 초기화할까요?'))return;
  setSyncStatus('order','loading','초기화 중...');
  try{await apiPost({action:'reset'});orders=[];setSyncStatus('order','ok','초기화 완료');alert('초기화 완료!');}
  catch(e){setSyncStatus('order','err','초기화 실패');}
}

renderMenuGrid();
renderCart();
loadOrders('order');
</script>
</body>
</html>
